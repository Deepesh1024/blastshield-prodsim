service: blastshield-agent

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  memorySize: 512
  timeout: 30
  architecture: arm64
  environment:
    PYTHONPATH: /var/task
    S3_BUCKET: blastshield-artifacts
    EC2_SANDBOX_URL: ${env:EC2_SANDBOX_URL, 'http://localhost:9000'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource: "*"
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: "arn:aws:s3:::blastshield-artifacts/*"

functions:
  api:
    handler: handler.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

package:
  patterns:
    - "!node_modules/**"
    - "!.git/**"
    - "!__pycache__/**"
    - "!*.pyc"
    - "!venv/**"
    - "!.venv/**"
    - "!examples/**"
    - "!ec2_sandbox/**"
    - "!tests/**"
    - "!README.md"

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false
    slim: true
    strip: false
